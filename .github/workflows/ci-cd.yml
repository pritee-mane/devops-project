# ─────────────────────────────────────────────────────────────────────
#  .github/workflows/ci-cd.yml
#  Full CI/CD pipeline: Test → Build → Push to Docker Hub → Deploy
#
#  SETUP (one-time):
#  Go to GitHub repo → Settings → Secrets and add:
#    DOCKER_USERNAME   → your Docker Hub username
#    DOCKER_PASSWORD   → your Docker Hub password / access token
#    SSH_HOST          → your server IP (for deployment)
#    SSH_USER          → your server SSH username
#    SSH_PRIVATE_KEY   → your private SSH key (cat ~/.ssh/id_rsa)
# ─────────────────────────────────────────────────────────────────────

name: CI/CD Pipeline

# ── Triggers ──────────────────────────────────────────────────────────
on:
  push:
    branches: [main, develop]       # Run on every push to main or develop
  pull_request:
    branches: [main]                # Run on PRs targeting main
  workflow_dispatch:                # Allow manual trigger from GitHub UI

# ── Environment variables (used across all jobs) ──────────────────────
env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/devops-project
  IMAGE_TAG: ${{ github.sha }}      # Unique tag per commit

# ══════════════════════════════════════════════════════════════════════
jobs:

  # ── JOB 1: Run Tests ────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest          # Fresh Ubuntu VM provided by GitHub

    steps:
      - name: Checkout code
        uses: actions/checkout@v4   # Pull your repo code into the runner

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package.json

      - name: Install dependencies
        run: |
          cd app
          npm install

      - name: Run tests
        run: |
          cd app
          npm test

      - name: Lint check (optional)
        run: echo "Add eslint or other linter here"

  # ── JOB 2: Build & Push Docker Image ────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test                     # Only runs if 'test' job passes

    # Only build+push on main branch (not on PRs)
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3   # Enables advanced build features

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha       # Use GitHub Actions cache to speed up builds
          cache-to: type=gha,mode=max

      - name: Output image digest
        run: echo "Image pushed successfully"

  # ── JOB 3: Deploy to Server ──────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build                    # Only runs if 'build' job passes
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Pull latest image
            docker pull ${{ env.IMAGE_NAME }}:latest

            # Stop old container
            docker stop devops-app || true
            docker rm devops-app || true

            # Start new container
            docker run -d \
              --name devops-app \
              --restart unless-stopped \
              -p 3000:3000 \
              -e NODE_ENV=production \
              ${{ env.IMAGE_NAME }}:latest

            # Clean up old images
            docker image prune -f

            echo "Deployment complete!"

      - name: Notify success
        run: echo "Deployed ${{ env.IMAGE_TAG }} to production"
